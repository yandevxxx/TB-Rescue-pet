<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PawBuddy - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus + label,
        input:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            background-color: #f9f9f9;
            padding: 0 4px;
            color: #ad2c00;
        }
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#99cbff",
                        "inverse-surface": "#2f3131",
                        "secondary": "#1b6d24",
                        "on-secondary-fixed": "#002204",
                        "on-surface-variant": "#5a413a",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary-container": "#217128",
                        "on-secondary-fixed-variant": "#005312",
                        "secondary-container": "#a0f399",
                        "tertiary-container": "#0b79bf",
                        "surface-container": "#eeeeee",
                        "surface-container-low": "#f3f3f3",
                        "surface-tint": "#b12d00",
                        "primary-fixed-dim": "#ffb5a0",
                        "on-tertiary-container": "#fdfcff",
                        "secondary-fixed-dim": "#88d982",
                        "on-surface": "#1a1c1c",
                        "on-primary-fixed-variant": "#872000",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#ffb5a0",
                        "background": "#f9f9f9",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9f9",
                        "secondary-fixed": "#a3f69c",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#004a78",
                        "tertiary": "#00609a",
                        "outline": "#8f7068",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e8e8e8",
                        "primary": "#ad2c00",
                        "surface-dim": "#dadada",
                        "on-background": "#1a1c1c",
                        "outline-variant": "#e3beb5",
                        "primary-fixed": "#ffdbd1",
                        "on-primary-container": "#fffbff",
                        "primary-container": "#d34011",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#001d34",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#3b0900",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#cfe5ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "margin-mobile": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "base": "8px",
                        "lg": "24px",
                        "gutter": "16px",
                        "margin-tablet": "24px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "title-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "0px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "0px", "fontWeight": "400"}],
                        "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "500"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                        "title-lg": ["22px", {"lineHeight": "28px", "letterSpacing": "0px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}],
                        "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Login Container -->
<main class="w-full max-w-md flex flex-col items-center">
<!-- Brand Header -->
<header class="mb-xl text-center">
<div class="flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="pets">pets</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary tracking-tight">PawBuddy</h1>
<p class="text-on-surface-variant text-body-md mt-xs">Hubungkan kasih sayang dengan teman setia.</p>
</header>
<!-- Form Section -->
<section class="w-full space-y-lg">
<!-- Email Input -->
<div class="relative w-full">
<input class="peer w-full h-14 px-md bg-transparent border border-outline rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="email" placeholder=" " type="email"/>
<label class="absolute left-md top-4 text-on-surface-variant font-label-lg pointer-events-none transition-all duration-200 origin-left" for="email">
                    Email
                </label>
</div>
<!-- Password Input -->
<div class="relative w-full">
<input class="peer w-full h-14 px-md pr-12 bg-transparent border border-outline rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="password" placeholder=" " type="password"/>
<label class="absolute left-md top-4 text-on-surface-variant font-label-lg pointer-events-none transition-all duration-200 origin-left" for="password">
                    Kata Sandi
                </label>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary active:scale-90 transition-transform" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="password-toggle-icon">visibility</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-xs">
<a class="text-label-lg font-label-lg text-primary hover:underline" href="#">Lupa Kata Sandi?</a>
</div>
<!-- Login Button -->
<div class="pt-sm">
<button class="w-full h-14 bg-primary text-on-primary font-title-md text-title-md rounded-full shadow-sm hover:bg-primary-container hover:text-on-primary-container active:scale-95 transition-all flex items-center justify-center gap-2" id="login-button" onclick="simulateLogin()">
<span id="button-text">Masuk</span>
<div class="loading-spinner hidden" id="loading-spinner"></div>
</button>
</div>
<!-- Secondary Action -->
<div class="text-center mt-lg">
<p class="text-on-surface-variant text-body-md">
                    Belum punya akun? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Daftar</a>
</p>
</div>
</section>
<!-- Illustration / Mood Decor -->
<div class="mt-xl w-full opacity-20 pointer-events-none overflow-hidden rounded-xl">
<div class="w-full h-32 bg-surface-container-high relative overflow-hidden">
<!-- Simple Geometric Paw Pattern -->
<div class="absolute inset-0 grid grid-cols-6 gap-4 p-4">
<span class="material-symbols-outlined text-outline-variant text-2xl" data-icon="pets">pets</span>
<span class="material-symbols-outlined text-outline-variant text-2xl" data-icon="favorite">favorite</span>
<span class="material-symbols-outlined text-outline-variant text-2xl" data-icon="home">home</span>
<span class="material-symbols-outlined text-outline-variant text-2xl" data-icon="pets">pets</span>
<span class="material-symbols-outlined text-outline-variant text-2xl" data-icon="volunteer_activism">volunteer_activism</span>
<span class="material-symbols-outlined text-outline-variant text-2xl" data-icon="pets">pets</span>
</div>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
                toggleIcon.dataset.icon = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
                toggleIcon.dataset.icon = 'visibility';
            }
        }

        function simulateLogin() {
            const btn = document.getElementById('login-button');
            const text = document.getElementById('button-text');
            const spinner = document.getElementById('loading-spinner');
            
            // Toggle loading state
            btn.disabled = true;
            text.classList.add('hidden');
            spinner.classList.remove('hidden');
            btn.classList.add('opacity-80');

            // Simulate server delay
            setTimeout(() => {
                btn.disabled = false;
                text.classList.remove('hidden');
                spinner.classList.add('hidden');
                btn.classList.remove('opacity-80');
                
                // Visual feedback (Success border)
                const inputs = document.querySelectorAll('input');
                inputs.forEach(input => {
                    input.classList.add('border-secondary');
                    setTimeout(() => input.classList.remove('border-secondary'), 1500);
                });
            }, 2000);
        }
    </script>
</body></html>
