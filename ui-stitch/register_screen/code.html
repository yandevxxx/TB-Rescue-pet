<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PawBuddy - Daftar Akun Baru</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* M3 Input Floating Label Logic */
        .input-container input:focus ~ label,
        .input-container input:not(:placeholder-shown) ~ label {
            transform: translateY(-24px) scale(0.85);
            background-color: #f9f9f9;
            padding: 0 4px;
            color: #ad2c00;
        }
        .input-container label {
            transition: all 0.2s ease-in-out;
            pointer-events: none;
        }
        .snackbar-hidden {
            transform: translateY(100px);
            opacity: 0;
        }
        .snackbar-visible {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#001d34",
                      "on-primary-container": "#fffbff",
                      "primary-fixed": "#ffdbd1",
                      "primary": "#ad2c00",
                      "inverse-surface": "#2f3131",
                      "surface-container-highest": "#e2e2e2",
                      "background": "#f9f9f9",
                      "inverse-on-surface": "#f1f1f1",
                      "surface": "#f9f9f9",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "surface-container-low": "#f3f3f3",
                      "primary-fixed-dim": "#ffb5a0",
                      "secondary-fixed": "#a3f69c",
                      "tertiary-container": "#0b79bf",
                      "secondary-container": "#a0f399",
                      "on-secondary": "#ffffff",
                      "primary-container": "#d34011",
                      "secondary": "#1b6d24",
                      "on-secondary-container": "#217128",
                      "on-primary": "#ffffff",
                      "on-tertiary-fixed-variant": "#004a78",
                      "on-tertiary-container": "#fdfcff",
                      "on-primary-fixed-variant": "#872000",
                      "tertiary-fixed": "#cfe5ff",
                      "surface-tint": "#b12d00",
                      "tertiary": "#00609a",
                      "surface-variant": "#e2e2e2",
                      "error": "#ba1a1a",
                      "on-secondary-fixed-variant": "#005312",
                      "on-primary-fixed": "#3b0900",
                      "error-container": "#ffdad6",
                      "surface-container-high": "#e8e8e8",
                      "secondary-fixed-dim": "#88d982",
                      "surface-container": "#eeeeee",
                      "on-error-container": "#93000a",
                      "surface-dim": "#dadada",
                      "surface-bright": "#f9f9f9",
                      "on-background": "#1a1c1c",
                      "inverse-primary": "#ffb5a0",
                      "outline-variant": "#e3beb5",
                      "tertiary-fixed-dim": "#99cbff",
                      "outline": "#8f7068",
                      "on-surface": "#1a1c1c",
                      "on-error": "#ffffff",
                      "on-surface-variant": "#5a413a",
                      "on-secondary-fixed": "#002204"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "md": "16px",
                      "xl": "32px",
                      "margin-tablet": "24px",
                      "sm": "8px",
                      "margin-mobile": "16px",
                      "lg": "24px",
                      "base": "8px",
                      "xs": "4px",
                      "gutter": "16px"
              },
              "fontFamily": {
                      "title-lg": ["Inter"],
                      "display-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-lg": ["Inter"],
                      "title-md": ["Inter"],
                      "label-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "title-lg": ["22px", {"lineHeight": "28px", "letterSpacing": "0px", "fontWeight": "500"}],
                      "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.25px", "fontWeight": "400"}],
                      "label-sm": ["11px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "36px", "letterSpacing": "0px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                      "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "500"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "0px", "fontWeight": "400"}],
                      "body-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.25px", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Top Branding / Visual Area -->
<div class="w-full max-w-sm mb-lg flex flex-col items-center text-center">
<div class="mb-lg w-20 h-20 rounded-full bg-primary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Daftar Akun Baru</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Bergabunglah dengan komunitas PawBuddy dan bantu hewan menemukan rumah baru.</p>
</div>
<!-- Registration Form -->
<form class="w-full max-w-sm space-y-lg" id="registrationForm" onsubmit="event.preventDefault(); showSnackbar('Gagal mendaftar. Silakan periksa koneksi internet Anda.')">
<!-- Name Field -->
<div class="relative input-container">
<input class="w-full h-14 px-md rounded-lg border border-outline bg-transparent text-on-surface focus:border-primary focus:ring-0 peer outline-none transition-colors" id="name" placeholder=" " required="" type="text"/>
<label class="absolute left-md top-1/2 -translate-y-1/2 font-body-md text-on-surface-variant transition-all peer-focus:text-primary" for="name">Nama Lengkap</label>
</div>
<!-- Email Field -->
<div class="relative input-container">
<input class="w-full h-14 px-md rounded-lg border border-outline bg-transparent text-on-surface focus:border-primary focus:ring-0 peer outline-none transition-colors" id="email" inputmode="email" placeholder=" " required="" type="email"/>
<label class="absolute left-md top-1/2 -translate-y-1/2 font-body-md text-on-surface-variant transition-all peer-focus:text-primary" for="email">Email</label>
</div>
<!-- Password Field -->
<div class="relative input-container">
<input class="w-full h-14 px-md pr-12 rounded-lg border border-outline bg-transparent text-on-surface focus:border-primary focus:ring-0 peer outline-none transition-colors" id="password" placeholder=" " required="" type="password"/>
<label class="absolute left-md top-1/2 -translate-y-1/2 font-body-md text-on-surface-variant transition-all peer-focus:text-primary" for="password">Kata Sandi</label>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
<!-- Register Button -->
<button class="w-full h-12 bg-primary text-on-primary font-label-lg text-label-lg rounded-full shadow-sm hover:shadow-md active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
            Daftar
        </button>
<!-- Footer Link -->
<div class="text-center pt-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                Sudah punya akun? 
                <a class="text-primary font-title-md hover:underline" href="#">Masuk</a>
</p>
</div>
</form>
<!-- Snackbar for Error Messages -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 w-[calc(100%-32px)] max-w-sm bg-inverse-surface text-inverse-on-surface p-md rounded-lg flex items-center justify-between shadow-xl snackbar-hidden transition-all duration-300 z-[100]" id="errorSnackbar">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">error</span>
<span class="font-body-md text-body-md" id="snackbarMessage">Pesan kesalahan di sini.</span>
</div>
<button class="text-tertiary-fixed-dim font-label-lg uppercase px-sm py-xs" onclick="hideSnackbar()">Tutup</button>
</div>
<!-- Scripting for UI interactions -->
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        let snackbarTimeout;
        function showSnackbar(message) {
            const snackbar = document.getElementById('errorSnackbar');
            const messageEl = document.getElementById('snackbarMessage');
            messageEl.innerText = message;
            
            snackbar.classList.remove('snackbar-hidden');
            snackbar.classList.add('snackbar-visible');
            
            clearTimeout(snackbarTimeout);
            snackbarTimeout = setTimeout(() => {
                hideSnackbar();
            }, 5000);
        }

        function hideSnackbar() {
            const snackbar = document.getElementById('errorSnackbar');
            snackbar.classList.add('snackbar-hidden');
            snackbar.classList.remove('snackbar-visible');
        }
    </script>
</body></html>
